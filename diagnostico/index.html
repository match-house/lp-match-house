function detectLinkType(url) {
  const u = url.toLowerCase();
  if (u.includes("instagram.com")) return "instagram";
  if (u.includes("linktr.ee") || u.includes("linktree")) return "linktree";
  if (u.includes("beacons.ai")) return "beacons";
  if (u.includes("wa.me") || u.includes("whatsapp.com")) return "whatsapp_only";
  return "site";
}

function onlyDigits(s) {
  return (s || "").replace(/\D/g, "");
}

// Máscara progressiva: (27) 99999-9999
function formatBrCell(s) {
  var d = onlyDigits(s).slice(0, 11);
  if (d.length === 0) return "";
  if (d.length <= 2) return "(" + d;
  if (d.length <= 6) return "(" + d.slice(0, 2) + ") " + d.slice(2);
  if (d.length <= 10)
    return "(" + d.slice(0, 2) + ") " + d.slice(2, 6) + "-" + d.slice(6);
  return "(" + d.slice(0, 2) + ") " + d.slice(2, 7) + "-" + d.slice(7);
}

// Celular brasileiro: 11 dígitos (DDD 11–99 + 9 + 8 dígitos)
function isValidBrCell(s) {
  var d = onlyDigits(s);
  if (d.length !== 11) return false;
  var ddd = parseInt(d.slice(0, 2), 10);
  if (ddd < 11 || ddd > 99) return false;
  if (d.charAt(2) !== "9") return false;
  return true;
}

function scoreFromAnalysis(analysis) {
  if (!analysis) return 0;
  let s = 0;
  if (analysis.hasBio) s += 5;
  if (analysis.hasOwnBrandLink) s += 6;
  if (analysis.hasWhatsappDirect) s += 5;
  if (analysis.hasCreci) s += 4;
  if (analysis.linkCount >= 3) s += 5;
  if (analysis.isInstagramOnly) s -= 6;
  return Math.max(0, Math.min(30, s));
}

function computeTotalScore(answers, analysis) {
  const quizMax = QUESTIONS.reduce(
    (sum, q) => sum + Math.max(...q.options.map((o) => o.v)),
    0
  );
  const quizSum = Object.values(answers).reduce((a, b) => a + b, 0);
  const quizPart = (quizSum / quizMax) * 70;
  const linkPart = scoreFromAnalysis(analysis);
  return Math.round(quizPart + linkPart);
}

function Diagnostico() {
  const [step, setStep] = useState("intro");
  const [name, setName] = useState("");
  const [whats, setWhats] = useState("");
  const [link, setLink] = useState("");
  const [linkType, setLinkType] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [error, setError] = useState("");
  const [sessionId] = useState(
    () => Math.random().toString(36).slice(2) + Date.now().toString(36)
  );

  const canStartLink = name.trim().length > 1 && isValidBrCell(whats);

  function goToLinkStep() {
    if (name.trim().length <= 1) {
      setError("Digite seu nome para continuar.");
      return;
    }
    if (!isValidBrCell(whats)) {
      setError("Digite um celular válido com DDD. Ex: (27) 99999-9999.");
      return;
    }
    setError("");
    sendPartial();
    setStep("link");
  }

  function runAnalysis() {
    if (!link.trim()) {
      setError("Cole o link que você usa na bio do Instagram.");
      return;
    }
    setError("");
    const type = detectLinkType(link);
    setLinkType(type);
    setStep("analyzing");

    setTimeout(() => {
      let result;
      if (type === "instagram") {
        result = {
          isInstagramOnly: true,
          hasBio: true,
          hasOwnBrandLink: false,
          hasWhatsappDirect: false,
          hasCreci: false,
          linkCount: 0,
          note: "O Instagram bloqueia a visualização externa de perfis. Isso por si só já é um dado: ferramentas, parceiros e até clientes que tentam acessar seu conteúdo por fora do app não conseguem ver nada do seu trabalho.",
        };
      } else if (type === "linktree" || type === "beacons") {
        result = {
          isInstagramOnly: false,
          hasBio: true,
          hasOwnBrandLink: false,
          hasWhatsappDirect: true,
          hasCreci: Math.random() > 0.5,
          linkCount: 3,
          note: "Seu link foi lido com sucesso. Ele mostra contato via WhatsApp e alguns links externos, mas usa um domínio de terceiros — isso significa que sua marca pessoal não aparece em nenhum lugar da URL.",
        };
      } else if (type === "whatsapp_only") {
        result = {
          isInstagramOnly: false,
          hasBio: false,
          hasOwnBrandLink: false,
          hasWhatsappDirect: true,
          hasCreci: false,
          linkCount: 1,
          note: "Seu link na bio vai direto para o WhatsApp, sem nenhuma página antes. Isso funciona, mas não mostra nada sobre quem você é antes da pessoa decidir te escrever.",
        };
      } else {
        result = {
          isInstagramOnly: false,
          hasBio: true,
          hasOwnBrandLink: true,
          hasWhatsappDirect: Math.random() > 0.4,
          hasCreci: Math.random() > 0.5,
          linkCount: 2,
          note: "Encontramos uma página própria. Isso já coloca você na frente da maioria dos corretores, que ainda dependem só do Instagram nativo ou de ferramentas genéricas.",
        };
      }
      setAnalysis(result);
      setStep("quiz");
    }, 2200);
  }

  function answer(qid, value) {
    const next = { ...answers, [qid]: value };
    setAnswers(next);
    if (qIndex < QUESTIONS.length - 1) {
      setQIndex(qIndex + 1);
    } else {
      sendLead(next);
      setStep("result");
    }
  }

  function quizScore() {
    return Object.values(answers).reduce((a, b) => a + b, 0);
  }

  function totalScore() {
    return computeTotalScore(answers, analysis);
  }

  function postLead(extra) {
    try {
      const payload = Object.assign(
        { sessionId, name, whats, link, linkType },
        extra
      );
      // text/plain evita o "preflight" de CORS; no-cors deixa o envio passar.
      fetch(LEADS_WEBHOOK, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload),
        keepalive: true,
      }).catch(() => {});
    } catch (e) {
      /* nunca bloqueia o usuário se o registro falhar */
    }
  }

  // Captura o lead assim que temos nome + WhatsApp, mesmo que não conclua.
  function sendPartial() {
    postLead({ status: "iniciado" });
  }

  function sendLead(finalAnswers) {
    const score = computeTotalScore(finalAnswers, analysis);
    const t = tier(score);
    postLead({
      status: "completo",
      score,
      tier: t.label,
      answers: finalAnswers,
    });
  }

  function tier(score) {
    if (score >= 80)
      return {
        label: "Referência Digital",
        color: "#3DDC84",
        desc: "Seu posicionamento já comunica autoridade. O próximo passo é converter mais do tráfego que você já tem.",
      };
    if (score >= 55)
      return {
        label: "Em Construção",
        color: BLUE,
        desc: "Você tem boas peças soltas, mas elas ainda não trabalham juntas como um sistema de captação.",
      };
    if (score >= 30)
      return {
        label: "Presença Básica",
        color: "#E4A11B",
        desc: "Sua presença existe, mas hoje depende de você estar disponível o tempo todo para não perder oportunidades.",
      };
    return {
      label: "Ponto de Partida",
      color: "#E45B5B",
      desc: "Boa notícia: a maior parte do que falta para destravar isso é estrutural, não experiência — e isso se resolve rápido.",
    };
  }

  return (
    <div style={styles.app}>
      <div style={styles.bgGlow} />
      <div style={styles.shell}>
        {step === "intro" && <Intro onNext={() => setStep("form")} />}
        {step === "form" && (
          <FormStep
            name={name}
            setName={setName}
            whats={whats}
            setWhats={setWhats}
            onSubmit={goToLinkStep}
            error={error}
          />
        )}
        {step === "link" && (
          <LinkStep link={link} setLink={setLink} onSubmit={runAnalysis} error={error} />
        )}
        {step === "analyzing" && <Analyzing link={link} />}
        {step === "quiz" && (
          <QuizStep
            analysis={analysis}
            linkType={linkType}
            question={QUESTIONS[qIndex]}
            index={qIndex}
            total={QUESTIONS.length}
            onAnswer={answer}
          />
        )}
        {step === "result" && (
          <ResultStep
            name={name}
            link={link}
            score={totalScore()}
            tierInfo={tier(totalScore())}
            analysis={analysis}
            answers={answers}
            onRestart={() => {
              setStep("intro");
              setQIndex(0);
              setAnswers({});
              setAnalysis(null);
              setLink("");
            }}
          />
        )}
      </div>
    </div>
  );
}

function buildRecommendations(analysis, answers) {
  const recs = [];
  if (analysis?.isInstagramOnly) {
    recs.push({
      color: "#E45B5B",
      head: "Seu link na bio não é visível por fora do Instagram",
      body: "Quem tenta acessar seu trabalho sem estar logado no Instagram não vê nada. Isso fecha a porta pra qualquer parceiro, anúncio ou indicação que não passe direto pelo app.",
    });
  }
  if (analysis && !analysis.hasOwnBrandLink && !analysis.isInstagramOnly) {
    recs.push({
      color: "#E4A11B",
      head: "Seu link usa a marca de outra empresa, não a sua",
      body: "Linktree, Beacons e similares funcionam, mas a URL nunca é sua. Você está construindo audiência num endereço que não te pertence.",
    });
  }
  if (answers.disponibilidade !== 3) {
    recs.push({
      color: "#E4A11B",
      head: "Leads esperam você estar online para serem qualificados",
      body: "Sem qualificação automática, todo contato fora do seu horário é uma chance de perder o lead pra quem responder primeiro.",
    });
  }
  if (answers.apresentacao !== 3) {
    recs.push({
      color: BLUE,
      head: "Quem clica no seu link não vê seus imóveis de forma clara",
      body: "Isso custa oportunidade: o cliente decide em segundos se continua ou some — e um link desorganizado é motivo suficiente pra ele sumir.",
    });
  }
  if (recs.length === 0) {
    recs.push({
      color: "#3DDC84",
      head: "Sua base está sólida",
      body: "O ganho agora está em otimizar conversão, não em corrigir estrutura.",
    });
  }
  return recs.slice(0, 3);
}

function ScoreRing({ score, color }) {
  const r = 52;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  return (
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10" />
      <circle
        cx="65"
        cy="65"
        r={r}
        fill="none"
        stroke={color}
        strokeWidth="10"
        strokeDasharray={c}
        strokeDashoffset={offset}
        strokeLinecap="round"
        transform="rotate(-90 65 65)"
        style={{ transition: "stroke-dashoffset 1s ease" }}
      />
      <text x="65" y="60" textAnchor="middle" fontSize="30" fontWeight="700" fill="#fff">
        {score}
      </text>
      <text x="65" y="80" textAnchor="middle" fontSize="11" fill="rgba(255,255,255,0.5)">
        / 100
      </text>
    </svg>
  );
}
